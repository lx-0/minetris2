<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111827"/>

  <!-- Title -->
  <text x="600" y="180" font-family="monospace" font-size="96" font-weight="bold" fill="#a855f7" text-anchor="middle">MineTris</text>
  <text x="600" y="250" font-family="monospace" font-size="32" fill="#9ca3af" text-anchor="middle">Where Minesweeper meets Tetris</text>

  <!-- Tetris block grid (decorative) -->
  <!-- Row 1 -->
  <rect x="360" y="310" width="40" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="404" y="310" width="40" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="448" y="310" width="40" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>
  <!-- Row 2 -->
  <rect x="360" y="354" width="40" height="40" rx="4" fill="#1d4ed8" opacity="0.8"/>
  <rect x="404" y="354" width="40" height="40" rx="4" fill="#1d4ed8" opacity="0.8"/>
  <rect x="448" y="354" width="40" height="40" rx="4" fill="#dc2626" opacity="0.9"/>
  <text x="468" y="379" font-family="monospace" font-size="18" fill="#fca5a5" text-anchor="middle">💣</text>
  <!-- Row 3 -->
  <rect x="360" y="398" width="40" height="40" rx="4" fill="#065f46" opacity="0.8"/>
  <rect x="404" y="398" width="40" height="40" rx="4" fill="#065f46" opacity="0.8"/>
  <rect x="448" y="398" width="40" height="40" rx="4" fill="#065f46" opacity="0.8"/>
  <text x="380" y="424" font-family="monospace" font-size="16" fill="#6ee7b7" text-anchor="middle">2</text>
  <text x="424" y="424" font-family="monospace" font-size="16" fill="#6ee7b7" text-anchor="middle">1</text>

  <!-- Separator dots -->
  <rect x="520" y="310" width="40" height="40" rx="4" fill="#374151" opacity="0.6"/>
  <rect x="564" y="310" width="40" height="40" rx="4" fill="#4b5563" opacity="0.6"/>
  <rect x="608" y="310" width="40" height="40" rx="4" fill="#374151" opacity="0.6"/>
  <rect x="652" y="310" width="40" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="696" y="310" width="40" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="740" y="310" width="40" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="784" y="310" width="40" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>

  <!-- Tagline at bottom -->
  <text x="600" y="570" font-family="monospace" font-size="24" fill="#6b7280" text-anchor="middle">Drop pieces · Avoid mines · Clear lines</text>
</svg>
